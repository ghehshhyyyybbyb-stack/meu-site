<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#080a0f;min-height:100vh;color:#e8e0d0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0f15}::-webkit-scrollbar-thumb{background:#00ff88;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00ff8844}50%{box-shadow:0 0 0 10px #00ff8800}}
@keyframes spin{to{transform:rotate(360deg)}}
.card-hover{transition:transform .3s,box-shadow .3s}
.card-hover:hover{transform:translateY(-6px);box-shadow:0 20px 40px #00ff8820}
.btn-p{background:#00ff88;color:#080a0f;border:none;padding:12px 28px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-p:hover{background:#00dd77;transform:translateY(-2px)}
.btn-o{background:transparent;color:#00ff88;border:1px solid #00ff8844;padding:10px 24px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase}
.btn-o:hover{border-color:#00ff88;background:#00ff8810}
.inp{background:#0d0f15;border:1px solid #1e2230;color:#e8e0d0;padding:12px 16px;font-family:'DM Mono',monospace;font-size:14px;width:100%;outline:none;transition:border .2s}
.inp:focus{border-color:#00ff88}
textarea.inp{resize:vertical}
.tag{display:inline-block;background:#00ff8815;color:#00ff88;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;text-transform:uppercase}
.udot{width:8px;height:8px;background:#ff4466;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
header{position:sticky;top:0;z-index:100;background:rgba(8,10,15,.93);backdrop-filter:blur(20px);border-bottom:1px solid #1e2230;padding:0 clamp(20px,5vw,80px)}
.hdr{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{cursor:pointer;display:flex;align-items:center;gap:10px}
.logo-box{width:32px;height:32px;background:#00ff88;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-txt{font-weight:800;font-size:18px;letter-spacing:2px;color:#e8e0d0}
.logo-txt span{color:#00ff88}
.nav-wrap{display:flex;gap:28px;align-items:center}
.nl{cursor:pointer;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8a8a9a;transition:color .2s;padding:4px 0;border-bottom:1px solid transparent}
.nl.on{color:#00ff88;border-bottom-color:#00ff88}
.ci{cursor:pointer;position:relative;font-size:20px;user-select:none}
.cb{position:absolute;top:-8px;right:-8px;background:#00ff88;color:#080a0f;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center}
.pg{display:none}.pg.on{display:block}
footer{border-top:1px solid #1e2230;padding:40px clamp(20px,6vw,100px);margin-top:60px}
.ft{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.fl{cursor:pointer;font-size:12px;color:#8a8a9a;font-family:'DM Mono';letter-spacing:1px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;font-family:'DM Mono';font-size:13px;z-index:9999;white-space:nowrap;display:none;pointer-events:none}
.lbl{font-size:11px;color:#8a8a9a;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;font-family:'DM Mono'}
.fld{margin-bottom:16px}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo" onclick="goTo('home')">
      <div class="logo-box">⚡</div>
      <span class="logo-txt">DEV<span>STUDIO</span></span>
    </div>
    <div class="nav-wrap">
      <span class="nl on" id="nl-home"     onclick="goTo('home')">Início</span>
      <span class="nl"    id="nl-servicos" onclick="goTo('servicos')">Serviços</span>
      <span class="nl"    id="nl-contato"  onclick="goTo('contato')">Contato</span>
      <div class="ci" onclick="goTo('carrinho')">🛍️<span class="cb" id="cart-badge">0</span></div>
      <div class="ci" id="admin-btn" onclick="goTo('admin')">🔒</div>
    </div>
  </div>
</header>

<div id="pg-home"     class="pg on"></div>
<div id="pg-servicos" class="pg"></div>
<div id="pg-carrinho" class="pg"></div>
<div id="pg-contato"  class="pg"></div>
<div id="pg-admin"    class="pg"></div>

<footer>
  <div class="ft">
    <div style="font-weight:800;font-size:16px;letter-spacing:2px">DEV<span style="color:#00ff88">STUDIO</span></div>
    <div style="display:flex;gap:24px">
      <span class="fl" onclick="goTo('home')">Início</span>
      <span class="fl" onclick="goTo('servicos')">Serviços</span>
      <span class="fl" onclick="goTo('contato')">Contato</span>
    </div>
    <div style="font-size:12px;color:#8a8a9a;font-family:'DM Mono'">© 2025 DevStudio. Todos os direitos reservados.</div>
  </div>
</footer>

<div id="toast"></div>

<script>
var SVC = [
  {id:1, icon:"🛒", title:"Loja Virtual",       desc:"E-commerce completo com carrinho, pagamento e painel de gestao de produtos.", oldPrice:1800, price:720,  tag:"Mais pedido", prazo:"5 a 7 dias"},
  {id:2, icon:"🏢", title:"Site Institucional", desc:"Presenca digital profissional para empresas, com SEO e design moderno.",       oldPrice:900,  price:360,  tag:null,          prazo:"3 a 5 dias"},
  {id:3, icon:"🍔", title:"Cardapio Digital",   desc:"Menu online com pedidos via WhatsApp, categorias e fotos dos produtos.",       oldPrice:650,  price:260,  tag:"Popular",     prazo:"3 dias"},
  {id:4, icon:"📸", title:"Portfolio / Blog",   desc:"Mostre seu trabalho ou publique conteudo com design editorial unico.",         oldPrice:750,  price:300,  tag:null,          prazo:"2 a 3 dias"},
  {id:5, icon:"🏠", title:"Site Imobiliario",   desc:"Catalogo de imoveis com filtros, fotos e formulario de contato integrado.",    oldPrice:1400, price:560,  tag:null,          prazo:"A combinar"},
  {id:6, icon:"📅", title:"Agendamento Online", desc:"Sistema de reservas e agendamentos para clinicas, saloes e servicos.",         oldPrice:1200, price:480,  tag:"Novo",        prazo:"A combinar"},
  {id:7, icon:"🎓", title:"Plataforma EAD",     desc:"Area de membros com cursos, videos e progresso do aluno.",                     oldPrice:2500, price:1000, tag:null,          prazo:"A combinar"},
  {id:8, icon:"🎨", title:"Landing Page",       desc:"Pagina de captura de alta conversao para lancamentos e campanhas.",            oldPrice:450,  price:180,  tag:"Rapido",      prazo:"A combinar"}
];

var ADMIN_USER = "001matheus";
var ADMIN_PASS = "0004";
var cart = [];
var adminLogged = false;
var currentPage = "home";
var adminTab = "msgs";
var replyingId = null;

function loadLS(k) {
  try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}
function saveLS(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}

var messages = loadLS("ds_msgs");
var orders   = loadLS("ds_orders");

/* ---- Toast ---- */
var toastTimer = null;
function showToast(msg, color) {
  if (!color) color = "#00ff88";
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.cssText = "display:block;background:#0d1420;border:1px solid " + color + ";color:" + color + ";position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;font-family:'DM Mono';font-size:13px;z-index:9999;white-space:nowrap;pointer-events:none";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.style.display = "none"; }, 3000);
}

/* ---- Navigation ---- */
function goTo(page) {
  var all = document.querySelectorAll(".pg");
  for (var i = 0; i < all.length; i++) all[i].classList.remove("on");
  document.getElementById("pg-" + page).classList.add("on");
  var nls = document.querySelectorAll(".nl");
  for (var i = 0; i < nls.length; i++) nls[i].classList.remove("on");
  var nl = document.getElementById("nl-" + page);
  if (nl) nl.classList.add("on");
  currentPage = page;
  window.scrollTo(0, 0);
  if (page === "home")     renderHome();
  if (page === "servicos") renderServicos();
  if (page === "carrinho") renderCart("list");
  if (page === "contato")  renderContato(false);
  if (page === "admin")    renderAdmin();
  updBadge();
  updAdminBtn();
}

function updBadge() {
  var b = document.getElementById("cart-badge");
  if (cart.length > 0) { b.style.display = "flex"; b.textContent = cart.length; }
  else { b.style.display = "none"; }
}

function updAdminBtn() {
  var unread = 0;
  for (var i = 0; i < messages.length; i++) if (!messages[i].read) unread++;
  var btn = document.getElementById("admin-btn");
  var dot = unread > 0 ? '<span style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:#ff4466;border-radius:50%;display:block"></span>' : "";
  btn.innerHTML = (adminLogged ? "🔓" : "🔒") + dot;
}

/* ---- Cart ---- */
function addToCart(sid) {
  var svc = null;
  for (var i = 0; i < SVC.length; i++) { if (SVC[i].id === sid) { svc = SVC[i]; break; } }
  if (!svc) return;
  var found = false;
  for (var i = 0; i < cart.length; i++) if (cart[i].id === sid) { found = true; break; }
  if (!found) cart.push({id:svc.id, icon:svc.icon, title:svc.title, price:svc.price});
  updBadge();
  showToast('"' + svc.title + '" adicionado ao carrinho!');
}

function removeFromCart(sid) {
  var nc = [];
  for (var i = 0; i < cart.length; i++) if (cart[i].id !== sid) nc.push(cart[i]);
  cart = nc;
  updBadge();
  renderCart("list");
}

/* ---- Helpers ---- */
function gv(elid) {
  var el = document.getElementById(elid);
  return el ? el.value.trim() : "";
}

function mkField(elid, label, type) {
  return '<div class="fld"><label class="lbl">' + label + '</label><input class="inp" type="' + type + '" id="' + elid + '"></div>';
}

function mkTextarea(elid, label) {
  return '<div class="fld"><label class="lbl">' + label + '</label><textarea class="inp" id="' + elid + '" rows="3"></textarea></div>';
}

function mkCard(s, delay) {
  if (!delay) delay = 0;
  var tagH = s.tag ? '<div class="tag" style="margin-bottom:10px">' + s.tag + '</div>' : "";
  var oldPriceStr = s.oldPrice ? 'R$ ' + s.oldPrice.toLocaleString("pt-BR") : "";
  var prazoH = s.prazo ? '<div style="font-size:11px;color:#8a8a9a;font-family:\'DM Mono\',monospace;margin-top:6px">Prazo: ' + s.prazo + '</div>' : "";
  return '<div class="card-hover" style="background:#0d0f15;border:1px solid #1e2230;padding:28px;animation:fadeUp .6s ease ' + delay + 'ms both;position:relative;overflow:hidden">'
    + '<div style="position:absolute;top:0;right:0;background:#ff4400;color:#fff;font-size:10px;font-weight:800;padding:4px 10px;letter-spacing:1px">60% OFF</div>'
    + tagH
    + '<div style="font-size:36px;margin-bottom:12px">' + s.icon + '</div>'
    + '<h3 style="font-size:18px;font-weight:700;margin-bottom:10px">' + s.title + '</h3>'
    + '<p style="color:#8a8a9a;font-size:13px;line-height:1.7;font-family:\'DM Mono\',monospace;margin-bottom:20px">' + s.desc + '</p>'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-end">'
    + '<div>'
    + '<div style="font-size:12px;color:#8a8a9a;text-decoration:line-through;font-family:\'DM Mono\',monospace">' + oldPriceStr + '</div>'
    + '<div style="font-size:22px;font-weight:800;color:#00ff88;line-height:1.1">R$ ' + s.price.toLocaleString("pt-BR") + '</div>'
    + prazoH
    + '</div>'
    + '<button class="btn-p" style="font-size:12px;padding:10px 18px" onclick="addToCart(' + s.id + ')">+ Adicionar</button>'
    + '</div></div>';
}

/* ---- HOME ---- */
function renderHome() {
  var cards = "";
  for (var i = 0; i < 4; i++) cards += mkCard(SVC[i], i * 80);
  document.getElementById("pg-home").innerHTML =
    '<section style="min-height:90vh;display:flex;align-items:center;padding:80px clamp(20px,8vw,120px);position:relative;overflow:hidden">'
    + '<div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 70% 50%,#00ff8808 0%,transparent 70%);pointer-events:none"></div>'
    + '<div style="position:absolute;top:20%;right:8%;width:300px;height:300px;border:1px solid #00ff8815;border-radius:50%;animation:spin 30s linear infinite;pointer-events:none"></div>'
    + '<div style="position:absolute;top:25%;right:10%;width:200px;height:200px;border:1px solid #00ff8825;border-radius:50%;animation:spin 20s linear infinite reverse;pointer-events:none"></div>'
    + '<div style="max-width:680px;animation:fadeUp .8s ease">'
    + '<div class="tag" style="margin-bottom:24px">Desenvolvimento Web Profissional</div>'
    + '<h1 style="font-size:clamp(42px,7vw,88px);font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:28px">Sites que<br><span style="color:#00ff88">convertem</span><br>de verdade.</h1>'
    + '<p style="font-size:17px;color:#8a8a9a;line-height:1.8;max-width:500px;margin-bottom:40px;font-family:\'DM Mono\',monospace">Criamos sua presenca digital com design moderno, codigo limpo e entrega rapida.</p>'
    + '<div style="display:flex;gap:16px;flex-wrap:wrap">'
    + '<button class="btn-p" onclick="goTo(\'servicos\')">Ver servicos</button>'
    + '<button class="btn-o" onclick="goTo(\'contato\')">Falar comigo</button>'
    + '</div>'
    + '<div style="display:flex;gap:40px;margin-top:60px">'
    + '<div><div style="font-size:28px;font-weight:800;color:#00ff88">50+</div><div style="font-size:11px;color:#8a8a9a;letter-spacing:1px;text-transform:uppercase;font-family:\'DM Mono\',monospace">Sites entregues</div></div>'
    + '<div><div style="font-size:28px;font-weight:800;color:#00ff88">3 dias</div><div style="font-size:11px;color:#8a8a9a;letter-spacing:1px;text-transform:uppercase;font-family:\'DM Mono\',monospace">Prazo medio</div></div>'
    + '<div><div style="font-size:28px;font-weight:800;color:#00ff88">100%</div><div style="font-size:11px;color:#8a8a9a;letter-spacing:1px;text-transform:uppercase;font-family:\'DM Mono\',monospace">Satisfacao</div></div>'
    + '</div></div></section>'
    + '<section style="padding:80px clamp(20px,6vw,100px)">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px;flex-wrap:wrap;gap:16px">'
    + '<div><div class="tag" style="margin-bottom:12px">O que faco</div><h2 style="font-size:clamp(28px,4vw,48px);font-weight:800;letter-spacing:-1px">Tipos de site</h2></div>'
    + '<button class="btn-o" onclick="goTo(\'servicos\')">Ver todos →</button>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px">' + cards + '</div>'
    + '</section>'
    + '<section style="padding:80px clamp(20px,6vw,100px);text-align:center">'
    + '<div style="background:#0d0f15;border:1px solid #00ff8822;padding:60px 40px;max-width:700px;margin:0 auto">'
    + '<div style="font-size:48px;margin-bottom:20px">💬</div>'
    + '<h2 style="font-size:clamp(24px,3vw,40px);font-weight:800;margin-bottom:16px">Tem um projeto em mente?</h2>'
    + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;margin-bottom:32px;font-size:14px;line-height:1.8">Me manda uma mensagem e respondo em ate 1 hora.</p>'
    + '<button class="btn-p" onclick="goTo(\'contato\')">Iniciar conversa</button>'
    + '</div></section>';
}

/* ---- SERVICOS ---- */
function renderServicos() {
  var cards = "";
  for (var i = 0; i < SVC.length; i++) cards += mkCard(SVC[i], i * 60);
  document.getElementById("pg-servicos").innerHTML =
    '<div style="padding:60px clamp(20px,6vw,100px)">'
    + '<div class="tag" style="margin-bottom:12px">Catalogo completo</div>'
    + '<h2 style="font-size:clamp(28px,4vw,52px);font-weight:800;letter-spacing:-1px;margin-bottom:8px">Servicos & Precos</h2>'
    + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;margin-bottom:48px;font-size:14px">Adicione ao carrinho e solicite seu orcamento</p>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px">' + cards + '</div>'
    + '</div>';
}

/* ---- CARRINHO ---- */
function renderCart(step) {
  var total = 0;
  for (var i = 0; i < cart.length; i++) total += cart[i].price;
  var el = document.getElementById("pg-carrinho");

  if (step === "done") {
    el.innerHTML =
      '<div style="padding:100px clamp(20px,6vw,100px);text-align:center;animation:fadeUp .5s">'
      + '<div style="font-size:64px;margin-bottom:24px">🎉</div>'
      + '<h2 style="font-size:36px;font-weight:800;margin-bottom:16px">Pedido recebido!</h2>'
      + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;margin-bottom:32px">Entrarei em contato no email informado em breve.</p>'
      + '<button class="btn-p" onclick="goTo(\'home\')">Voltar ao inicio</button></div>';
    return;
  }

  if (step === "form") {
    el.innerHTML =
      '<div style="padding:60px clamp(20px,6vw,100px);max-width:600px">'
      + '<h2 style="font-size:32px;font-weight:800;margin-bottom:32px">Seus dados</h2>'
      + mkField("order-name",  "Nome completo *", "text")
      + mkField("order-email", "E-mail *",        "email")
      + mkField("order-phone", "WhatsApp",         "text")
      + mkTextarea("order-obs","Observacoes")
      + '<div style="display:flex;gap:12px;margin-top:24px">'
      + '<button class="btn-o" onclick="renderCart(\'list\')">← Voltar</button>'
      + '<button class="btn-p" onclick="submitOrder()">Enviar pedido</button>'
      + '</div></div>';
    return;
  }

  if (cart.length === 0) {
    el.innerHTML =
      '<div style="padding:60px clamp(20px,6vw,100px);text-align:center">'
      + '<div style="font-size:64px;margin-bottom:16px">🛒</div>'
      + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Seu carrinho esta vazio.</p>'
      + '<button class="btn-p" style="margin-top:24px" onclick="goTo(\'servicos\')">Ver servicos</button></div>';
    return;
  }

  var items = "";
  for (var i = 0; i < cart.length; i++) {
    var c = cart[i];
    items +=
      '<div style="background:#0d0f15;border:1px solid #1e2230;padding:24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      + '<div style="display:flex;gap:20px;align-items:center">'
      + '<span style="font-size:32px">' + c.icon + '</span>'
      + '<div><div style="font-weight:700">' + c.title + '</div>'
      + '<div style="color:#00ff88;font-weight:700">R$ ' + c.price.toLocaleString("pt-BR") + '</div></div></div>'
      + '<button style="background:none;border:1px solid #ff446640;color:#ff4466;padding:6px 14px;cursor:pointer;font-family:\'Syne\',sans-serif;font-size:12px" onclick="removeFromCart(' + c.id + ')">remover</button>'
      + '</div>';
  }

  el.innerHTML =
    '<div style="padding:60px clamp(20px,6vw,100px)">'
    + '<h2 style="font-size:32px;font-weight:800;margin-bottom:32px">Carrinho (' + cart.length + ')</h2>'
    + '<div style="display:grid;grid-template-columns:1fr 280px;gap:40px;align-items:start">'
    + '<div>' + items + '</div>'
    + '<div style="background:#0d0f15;border:1px solid #1e2230;padding:28px">'
    + '<div style="font-size:13px;color:#8a8a9a;margin-bottom:8px;font-family:\'DM Mono\',monospace">Total estimado</div>'
    + '<div style="font-size:32px;font-weight:800;color:#00ff88;margin-bottom:24px">R$ ' + total.toLocaleString("pt-BR") + '</div>'
    + '<p style="font-size:11px;color:#8a8a9a;font-family:\'DM Mono\',monospace;line-height:1.6;margin-bottom:20px">Valores a confirmar apos analise do projeto.</p>'
    + '<button class="btn-p" style="width:100%" onclick="renderCart(\'form\')">Solicitar orcamento →</button>'
    + '</div></div></div>';
}

function submitOrder() {
  var name  = gv("order-name");
  var email = gv("order-email");
  var phone = gv("order-phone");
  var obs   = gv("order-obs");
  if (!name || !email) { showToast("Preencha nome e email!", "#ff4466"); return; }
  var total = 0;
  for (var i = 0; i < cart.length; i++) total += cart[i].price;
  var order = {id:Date.now(), name:name, email:email, phone:phone, obs:obs, items:cart.slice(), total:total, status:"Aguardando", date:new Date().toLocaleString("pt-BR")};
  orders.push(order);
  saveLS("ds_orders", orders);
  cart = [];
  updBadge();
  renderCart("done");
  showToast("Pedido enviado! Entrarei em contato.");
}

/* ---- CONTATO ---- */
function renderContato(sent) {
  var el = document.getElementById("pg-contato");
  var hdr =
    '<div style="padding:60px clamp(20px,6vw,100px);max-width:700px;margin:0 auto">'
    + '<div class="tag" style="margin-bottom:12px">Bora conversar</div>'
    + '<h2 style="font-size:clamp(28px,4vw,48px);font-weight:800;margin-bottom:8px">Fale comigo</h2>'
    + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;font-size:13px;margin-bottom:40px;line-height:1.7">Me manda sua duvida ou ideia. Respondo rapido!</p>';

  if (sent) {
    var repl = "";
    for (var i = 0; i < messages.length; i++) {
      if (messages[i].reply) {
        repl +=
          '<div style="background:#00ff8810;border:1px solid #00ff8833;padding:16px;margin-bottom:12px">'
          + '<div style="font-size:11px;color:#00ff88;font-family:\'DM Mono\',monospace;margin-bottom:6px">↩ Resposta do Dev</div>'
          + '<div style="font-size:14px;line-height:1.6">' + messages[i].reply + '</div></div>';
      }
    }
    el.innerHTML = hdr
      + '<div style="background:#0d0f15;border:1px solid #00ff8833;padding:32px;animation:fadeUp .5s">'
      + '<div style="font-size:40px;margin-bottom:16px">✅</div>'
      + '<h3 style="font-weight:700;margin-bottom:8px">Mensagem enviada!</h3>'
      + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;font-size:13px;margin-bottom:24px">Responderei em breve. Fique de olho no seu email!</p>'
      + repl
      + '<button class="btn-o" onclick="renderContato(false)">Enviar outra mensagem</button>'
      + '</div></div>';
  } else {
    el.innerHTML = hdr
      + '<div style="background:#0d0f15;border:1px solid #1e2230;padding:32px">'
      + mkField("ct-name",  "Seu nome *",                      "text")
      + mkField("ct-email", "E-mail (para receber resposta)",  "email")
      + mkTextarea("ct-text","Mensagem *")
      + '<button class="btn-p" onclick="sendMsg()">Enviar mensagem ✈️</button>'
      + '</div></div>';
  }
}

function sendMsg() {
  var name  = gv("ct-name");
  var email = gv("ct-email");
  var text  = gv("ct-text");
  if (!name || !text) { showToast("Preencha nome e mensagem!", "#ff4466"); return; }
  var msg = {id:Date.now(), name:name, email:email, text:text, time:new Date().toLocaleString("pt-BR"), reply:null, read:false};
  messages.push(msg);
  saveLS("ds_msgs", messages);
  updAdminBtn();
  renderContato(true);
}

/* ---- ADMIN ---- */
function renderAdmin() {
  var el = document.getElementById("pg-admin");
  if (!adminLogged) {
    el.innerHTML =
      '<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px">'
      + '<div style="background:#0d0f15;border:1px solid #1e2230;padding:48px 40px;width:100%;max-width:380px;animation:fadeUp .5s">'
      + '<div style="text-align:center;margin-bottom:32px">'
      + '<div style="font-size:40px;margin-bottom:12px">🔒</div>'
      + '<h2 style="font-weight:800;font-size:22px">Area Admin</h2>'
      + '<p style="color:#8a8a9a;font-size:12px;font-family:\'DM Mono\',monospace;margin-top:6px">Acesso restrito</p></div>'
      + mkField("adm-user", "Usuario", "text")
      + mkField("adm-pass", "Senha",   "password")
      + '<div id="adm-err" style="color:#ff4466;font-size:12px;font-family:\'DM Mono\',monospace;margin-bottom:12px;display:none">❌ Usuario ou senha incorretos</div>'
      + '<button class="btn-p" style="width:100%;margin-top:8px" onclick="doLogin()">Entrar</button>'
      + '</div></div>';
    setTimeout(function() {
      var pu = document.getElementById("adm-user");
      var pp = document.getElementById("adm-pass");
      if (pu) pu.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
      if (pp) pp.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
    }, 50);
    return;
  }
  renderDash();
}

function doLogin() {
  var u = gv("adm-user");
  var p = gv("adm-pass");
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    adminLogged = true;
    updAdminBtn();
    renderDash();
  } else {
    var e = document.getElementById("adm-err");
    if (e) e.style.display = "block";
  }
}

function doLogout() { adminLogged = false; updAdminBtn(); renderAdmin(); }

function renderDash() {
  var el = document.getElementById("pg-admin");
  var unread = 0;
  for (var i = 0; i < messages.length; i++) if (!messages[i].read) unread++;
  var pending = 0;
  for (var i = 0; i < orders.length; i++) if (orders[i].status === "Aguardando") pending++;

  var stats = [
    ["💬", "Mensagens", messages.length, ""],
    ["🔴", "Nao lidas",  unread,          unread  > 0 ? "color:#ff4466" : ""],
    ["🛒", "Pedidos",    orders.length,   ""],
    ["⏳", "Pendentes",  pending,         pending > 0 ? "color:#ffaa00" : ""]
  ];
  var statsH = "";
  for (var i = 0; i < stats.length; i++) {
    statsH +=
      '<div style="background:#0d0f15;border:1px solid #1e2230;padding:20px 24px">'
      + '<div style="font-size:24px;margin-bottom:8px">' + stats[i][0] + '</div>'
      + '<div style="font-size:26px;font-weight:800;' + stats[i][3] + '">' + stats[i][2] + '</div>'
      + '<div style="font-size:11px;color:#8a8a9a;text-transform:uppercase;letter-spacing:1px;font-family:\'DM Mono\',monospace">' + stats[i][1] + '</div></div>';
  }

  var cMsgs = adminTab === "msgs"   ? "#00ff88" : "#8a8a9a";
  var cOrd  = adminTab === "orders" ? "#00ff88" : "#8a8a9a";
  var bMsgs = adminTab === "msgs"   ? "2px solid #00ff88" : "2px solid transparent";
  var bOrd  = adminTab === "orders" ? "2px solid #00ff88" : "2px solid transparent";

  el.innerHTML =
    '<div style="padding:40px clamp(20px,5vw,80px)">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px">'
    + '<div><h2 style="font-size:28px;font-weight:800">Painel Admin 🔓</h2>'
    + '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;font-size:12px">Bem-vindo de volta, Matheus!</p></div>'
    + '<button class="btn-o" onclick="doLogout()">Sair</button></div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px">' + statsH + '</div>'
    + '<div style="display:flex;border-bottom:1px solid #1e2230;margin-bottom:32px">'
    + '<button style="background:none;border:none;font-family:\'Syne\',sans-serif;font-weight:700;font-size:13px;padding:12px 24px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;color:' + cMsgs + ';border-bottom:' + bMsgs + '" onclick="switchTab(\'msgs\')">💬 Mensagens</button>'
    + '<button style="background:none;border:none;font-family:\'Syne\',sans-serif;font-weight:700;font-size:13px;padding:12px 24px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;color:' + cOrd + ';border-bottom:' + bOrd + '" onclick="switchTab(\'orders\')">🛒 Pedidos</button>'
    + '</div>'
    + '<div id="tab-content"></div></div>';
  renderTab();
}

function switchTab(t) { adminTab = t; renderDash(); }

function renderTab() {
  var el = document.getElementById("tab-content");
  if (!el) return;

  if (adminTab === "msgs") {
    if (messages.length === 0) { el.innerHTML = '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Nenhuma mensagem ainda.</p>'; return; }
    var html = "";
    var rev = messages.slice().reverse();
    for (var i = 0; i < rev.length; i++) {
      var m = rev[i];
      var replyH = m.reply
        ? '<div style="background:#00ff8810;border:1px solid #00ff8830;padding:14px;margin-bottom:12px">'
          + '<div style="font-size:11px;color:#00ff88;font-family:\'DM Mono\',monospace;margin-bottom:4px">✅ Sua resposta:</div>'
          + '<div style="font-size:13px;color:#c8c0b0">' + m.reply + '</div></div>'
        : "";
      var borderColor = m.read ? "#1e2230" : "#00ff8833";
      html +=
        '<div style="background:#0d0f15;border:1px solid ' + borderColor + ';padding:24px;margin-bottom:16px">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">'
        + '<div><span style="font-weight:700">' + m.name + '</span>'
        + (m.email ? '<span style="color:#8a8a9a;font-family:\'DM Mono\',monospace;font-size:12px;margin-left:12px">' + m.email + '</span>' : "")
        + (!m.read ? '<span style="margin-left:12px"><span class="udot"></span></span>' : "")
        + '</div><span style="font-size:11px;color:#8a8a9a;font-family:\'DM Mono\',monospace">' + m.time + '</span></div>'
        + '<p style="color:#c8c0b0;line-height:1.7;font-size:14px;margin-bottom:16px">' + m.text + '</p>'
        + replyH
        + '<div style="display:flex;gap:10px;flex-wrap:wrap">'
        + (!m.read ? '<button class="btn-o" style="font-size:11px;padding:6px 14px" onclick="markRead(' + m.id + ')">Marcar como lida</button>' : "")
        + '<button class="btn-o" style="font-size:11px;padding:6px 14px" onclick="startReply(' + m.id + ')">↩ Responder</button>'
        + '</div>'
        + '<div id="rbox' + m.id + '" style="display:none;margin-top:16px">'
        + '<textarea class="inp" id="rtxt' + m.id + '" rows="3" placeholder="Digite sua resposta..." style="margin-bottom:10px"></textarea>'
        + '<div style="display:flex;gap:10px">'
        + '<button class="btn-p" style="font-size:12px" onclick="sendReply(' + m.id + ')">Enviar resposta</button>'
        + '<button class="btn-o" style="font-size:12px" onclick="cancelReply(' + m.id + ')">Cancelar</button>'
        + '</div></div></div>';
    }
    el.innerHTML = html;
  }

  if (adminTab === "orders") {
    if (orders.length === 0) { el.innerHTML = '<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Nenhum pedido ainda.</p>'; return; }
    var html = "";
    var rev = orders.slice().reverse();
    for (var i = 0; i < rev.length; i++) {
      var o = rev[i];
      var itags = "";
      if (o.items) for (var j = 0; j < o.items.length; j++) itags += '<span class="tag">' + o.items[j].icon + ' ' + o.items[j].title + '</span> ';
      var sc = o.status === "Aguardando" ? "color:#ffaa00;border:1px solid #ffaa0044" : "color:#00ff88;border:1px solid #00ff8844";
      html +=
        '<div style="background:#0d0f15;border:1px solid #1e2230;padding:24px;margin-bottom:16px">'
        + '<div style="display:flex;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">'
        + '<div><div style="font-weight:700;font-size:16px">' + o.name + '</div>'
        + '<div style="color:#8a8a9a;font-size:12px;font-family:\'DM Mono\',monospace">' + o.email + (o.phone ? " • " + o.phone : "") + '</div></div>'
        + '<div style="text-align:right">'
        + '<div style="font-size:22px;font-weight:800;color:#00ff88">R$ ' + (o.total || 0).toLocaleString("pt-BR") + '</div>'
        + '<div style="font-size:10px;color:#8a8a9a;font-family:\'DM Mono\',monospace">' + o.date + '</div></div></div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">' + itags + '</div>'
        + (o.obs ? '<p style="font-size:13px;color:#8a8a9a;font-family:\'DM Mono\',monospace;border-top:1px solid #1e2230;padding-top:12px">📝 ' + o.obs + '</p>' : "")
        + '<div style="margin-top:12px"><span style="font-size:11px;font-family:\'DM Mono\',monospace;padding:3px 10px;' + sc + '">● ' + o.status + '</span></div>'
        + '</div>';
    }
    el.innerHTML = html;
  }
}

function markRead(mid) {
  for (var i = 0; i < messages.length; i++) if (messages[i].id === mid) { messages[i].read = true; break; }
  saveLS("ds_msgs", messages);
  updAdminBtn();
  renderDash();
}

function startReply(mid) {
  var boxes = document.querySelectorAll("[id^='rbox']");
  for (var i = 0; i < boxes.length; i++) boxes[i].style.display = "none";
  markRead(mid);
  var box = document.getElementById("rbox" + mid);
  if (box) box.style.display = "block";
  replyingId = mid;
}

function cancelReply(mid) {
  var box = document.getElementById("rbox" + mid);
  if (box) box.style.display = "none";
  replyingId = null;
}

function sendReply(mid) {
  var txt = gv("rtxt" + mid);
  if (!txt) return;
  for (var i = 0; i < messages.length; i++) {
    if (messages[i].id === mid) { messages[i].reply = txt; messages[i].read = true; break; }
  }
  saveLS("ds_msgs", messages);
  replyingId = null;
  showToast("Resposta enviada!");
  updAdminBtn();
  renderDash();
}

/* ---- Init ---- */
renderHome();
renderContato(false);
updAdminBtn();
</script>
</body>
</html>
