<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>DevStudio</title>

<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Syne',sans-serif;background:#080a0f;min-height:100vh;color:#e8e0d0;overflow-x:hidden}
img{max-width:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0f15}::-webkit-scrollbar-thumb{background:#00ff88;border-radius:2px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00ff8844}50%{box-shadow:0 0 0 10px #00ff8800}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── BUTTONS ── */
.btn-p{background:#00ff88;color:#080a0f;border:none;padding:13px 28px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;display:inline-block}
.btn-p:hover{background:#00dd77}
.btn-o{background:transparent;color:#00ff88;border:1px solid #00ff8844;padding:11px 24px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase;display:inline-block}
.btn-o:hover{border-color:#00ff88;background:#00ff8810}

/* ── INPUTS ── */
.inp{background:#0d0f15;border:1px solid #1e2230;color:#e8e0d0;padding:12px 14px;font-family:'DM Mono',monospace;font-size:14px;width:100%;outline:none;transition:border .2s;-webkit-appearance:none;border-radius:0}
.inp:focus{border-color:#00ff88}
textarea.inp{resize:vertical}
.lbl{font-size:11px;color:#8a8a9a;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;font-family:'DM Mono'}
.fld{margin-bottom:14px}
.tag{display:inline-block;background:#00ff8815;color:#00ff88;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;text-transform:uppercase}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(8,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid #1e2230}
.hdr{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px}
.logo{cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-box{width:28px;height:28px;background:#00ff88;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-txt{font-weight:800;font-size:16px;letter-spacing:2px}
.logo-txt span{color:#00ff88}
.nav-right{display:flex;align-items:center;gap:12px}
.ci{cursor:pointer;position:relative;font-size:18px;user-select:none;padding:4px}
.cb{position:absolute;top:-6px;right:-6px;background:#00ff88;color:#080a0f;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:800;display:none;align-items:center;justify-content:center}

/* Desktop nav links — hidden on mobile */
.nav-links{display:flex;gap:20px;align-items:center}
.nl{cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8a8a9a;transition:color .2s;padding:4px 0;border-bottom:1px solid transparent}
.nl.on{color:#00ff88;border-bottom-color:#00ff88}

/* Hamburger */
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:6px}
.ham span{display:block;width:22px;height:2px;background:#e8e0d0;transition:all .3s;border-radius:1px}

/* Mobile overlay menu */
#mob-menu{display:none;position:fixed;inset:0;background:#080a0f;z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:36px}
#mob-menu.open{display:flex}
.mob-nl{font-size:28px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#8a8a9a;cursor:pointer;transition:color .2s}
.mob-nl.on{color:#00ff88}
.mob-icons{display:flex;gap:32px;margin-top:8px}
#mob-close{position:absolute;top:18px;right:20px;font-size:24px;cursor:pointer;color:#8a8a9a;padding:4px}

/* ── PAGES ── */
.pg{display:none}.pg.on{display:block}

/* ── FOOTER ── */
footer{border-top:1px solid #1e2230;padding:32px 16px;margin-top:40px}
.ft{display:flex;flex-direction:column;gap:20px}
.ft-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.ft-links{display:flex;gap:20px}
.fl{cursor:pointer;font-size:12px;color:#8a8a9a;font-family:'DM Mono';letter-spacing:1px}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 20px;font-family:'DM Mono';font-size:12px;z-index:9999;white-space:nowrap;display:none;pointer-events:none;max-width:90vw;text-align:center}

/* ── CHAT WIDGET ── */
#chat-btn{position:fixed;bottom:20px;right:16px;width:52px;height:52px;background:#00ff88;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:999;box-shadow:0 4px 20px #00ff8840;transition:transform .2s}
#chat-btn:hover{transform:scale(1.1)}
#chat-notif{position:absolute;top:-3px;right:-3px;width:12px;height:12px;background:#ff4466;border-radius:50%;display:none;animation:blink 1s infinite}
#chat-box{position:fixed;bottom:84px;right:8px;left:8px;background:#0d0f15;border:1px solid #1e2230;z-index:998;display:none;flex-direction:column;box-shadow:0 20px 60px #000c;animation:fadeUp .25s;max-height:70vh}
#chat-box.open{display:flex}
#chat-header{background:#080a0f;padding:14px 16px;border-bottom:1px solid #1e2230;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#chat-header-left{display:flex;align-items:center;gap:10px}
#chat-online{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
#chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.msg-client{align-self:flex-end;background:#00ff8820;border:1px solid #00ff8830;color:#e8e0d0;padding:9px 13px;border-radius:12px 12px 2px 12px;font-size:13px;max-width:82%;line-height:1.5;word-break:break-word}
.msg-dev{align-self:flex-start;background:#1e2230;color:#e8e0d0;padding:9px 13px;border-radius:12px 12px 12px 2px;font-size:13px;max-width:82%;line-height:1.5;word-break:break-word}
.msg-time{font-size:10px;color:#8a8a9a;font-family:'DM Mono';margin-top:3px}
.msg-client .msg-time{text-align:right}
#chat-form{padding:10px;border-top:1px solid #1e2230;display:flex;gap:8px;flex-shrink:0}
#chat-input{flex:1;background:#080a0f;border:1px solid #1e2230;color:#e8e0d0;padding:10px 12px;font-family:'DM Mono';font-size:13px;outline:none;-webkit-appearance:none;border-radius:0;min-width:0}
#chat-input:focus{border-color:#00ff88}
#chat-send{background:#00ff88;color:#080a0f;border:none;padding:10px 14px;cursor:pointer;font-weight:800;font-size:16px;flex-shrink:0}
#chat-name-screen{padding:16px;display:flex;flex-direction:column;gap:12px}

/* ── CARDS ── */
.card{background:#0d0f15;border:1px solid #1e2230;padding:20px;position:relative;overflow:hidden;animation:fadeUp .5s ease both}
.card:active{opacity:.9}

/* ── CAROUSEL ── */
.carousel-wrap{position:relative;overflow:hidden}
.carousel-track{display:flex;gap:16px;transition:transform .4s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.carousel-slide{flex:0 0 calc(85vw);max-width:320px;cursor:pointer}
@media(min-width:641px){.carousel-slide{flex:0 0 340px;max-width:340px}}
.carousel-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:#0d0f15;border:1px solid #1e2230;position:relative;overflow:hidden}
.carousel-img-placeholder{width:100%;aspect-ratio:16/10;background:#0d0f15;border:1px solid #1e2230;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#8a8a9a;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px}
.carousel-info{padding:12px 0 4px}
.carousel-name{font-weight:700;font-size:14px;margin-bottom:4px}
.carousel-meta{font-size:11px;color:#8a8a9a;font-family:'DM Mono';display:flex;gap:12px;align-items:center}
.carousel-dots{display:flex;gap:6px;justify-content:center;margin-top:16px}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:#1e2230;cursor:pointer;transition:all .2s}
.carousel-dot.on{background:#00ff88;width:20px;border-radius:3px}
.carousel-nav{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.carousel-nav button{background:#0d0f15;border:1px solid #1e2230;color:#e8e0d0;width:36px;height:36px;cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.carousel-nav button:hover{border-color:#00ff88;color:#00ff88}

#promo-bar{background:linear-gradient(90deg,#ff4400,#ff6600);color:#fff;text-align:center;padding:10px 16px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;position:relative;z-index:99}
#promo-bar strong{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;margin:0 4px}
#countdown{font-weight:800;color:#fff;font-size:14px;letter-spacing:2px}

@media(min-width:641px){
  .hdr{height:64px;padding:0 clamp(20px,5vw,80px)}
  .ham{display:none !important}
  .nav-links{display:flex !important}
  #chat-box{left:auto;right:24px;width:340px;bottom:96px;max-height:500px}
  #chat-btn{right:24px;bottom:24px;width:56px;height:56px;font-size:24px}
  footer{padding:40px clamp(20px,6vw,100px)}
  .ft{flex-direction:row;justify-content:space-between;align-items:center}
}

/* ── MOBILE ONLY ── */
@media(max-width:640px){
  .ham{display:flex}
  .nav-links{display:none !important}

  /* sections */
  .sec{padding:40px 16px}
  .sec-lg{padding:56px 16px}

  /* hero */
  .hero{padding:56px 16px 40px;min-height:auto}
  .hero h1{font-size:36px;letter-spacing:-1px;line-height:1.1}
  .hero-btns{flex-direction:column;gap:10px}
  .hero-btns .btn-p,.hero-btns .btn-o{width:100%;text-align:center}
  .hero-stats{gap:20px;margin-top:32px}
  .hero-stats > div > div:first-child{font-size:22px}

  /* cards grid — single column */
  .cards-grid{grid-template-columns:1fr !important}

  /* cart grid — stack */
  .cart-grid{grid-template-columns:1fr !important}

  /* admin form */
  .adm-form{padding:28px 20px !important}

  /* button full width on mobile forms */
  .btn-full-mob{width:100%;text-align:center}

  /* section title */
  .sec-title{font-size:26px !important}

  /* carousel orbit decorations hidden */
  .orbit{display:none}
}
</style>
</head>

var SVC = [
  {id:1,icon:"🛒",title:"Loja Virtual",       desc:"E-commerce completo com carrinho, pagamento e gestao de produtos.",oldPrice:1800,price:720, tag:"Mais pedido",prazo:"5 a 7 dias"},

var ADMIN_USER="001matheus", ADMIN_PASS="0004";

function loadLS(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):[]}catch(e){return[]}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
orders=loadLS("ds_orders");

/* ── TOAST ── */
var _tt=null;
function showToast(msg,color){
  if(!color)color="#00ff88";
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.style.cssText="display:block;background:#0d1420;border:1px solid "+color+";color:"+color+";position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 20px;font-family:'DM Mono';font-size:12px;z-index:9999;pointer-events:none;max-width:90vw;text-align:center";
  clearTimeout(_tt);
  _tt=setTimeout(function(){t.style.display="none"},3000);
}

/* ── MOBILE MENU ── */
function openMenu(){document.getElementById("mob-menu").classList.add("open");}
function closeMenu(){document.getElementById("mob-menu").classList.remove("open");}

/* ── NAV ── */
function goTo(page){
  var all=document.querySelectorAll(".pg");
  for(var i=0;i<all.length;i++) all[i].classList.remove("on");
  document.getElementById("pg-"+page).classList.add("on");
  var nls=document.querySelectorAll(".nl,.mob-nl");
  for(var i=0;i<nls.length;i++) nls[i].classList.remove("on");
  var nl=document.getElementById("nl-"+page);
  if(nl) nl.classList.add("on");
  var mnl=document.getElementById("mnl-"+page);
  if(mnl) mnl.classList.add("on");
  currentPage=page;
  window.scrollTo(0,0);
  if(page==="home")     renderHome();
  if(page==="servicos") renderServicos();
  if(page==="carrinho") renderCart("list");
  if(page==="admin")    renderAdmin();
  updBadge(); updAdminBtn();
}

function updBadge(){
  var bs=[document.getElementById("cart-badge"),document.getElementById("cart-badge2")];
  for(var i=0;i<bs.length;i++){
    if(!bs[i]) continue;
    if(cart.length>0){bs[i].style.display="flex";bs[i].textContent=cart.length;}
    else bs[i].style.display="none";
  }
}
function updAdminBtn(){
  var icon=adminLogged?"🔓":"🔒";
  var b1=document.getElementById("admin-btn"); if(b1) b1.innerHTML=icon;
  var b2=document.getElementById("admin-btn2"); if(b2) b2.innerHTML=icon;
}

/* ── CART ── */
function addToCart(sid){
  var svc=null;
  for(var i=0;i<SVC.length;i++) if(SVC[i].id===sid){svc=SVC[i];break;}
  if(!svc) return;
  var found=false;
  for(var i=0;i<cart.length;i++) if(cart[i].id===sid){found=true;break;}
  if(!found) cart.push({id:svc.id,icon:svc.icon,title:svc.title,price:svc.price});
  updBadge();
  showToast(svc.title+" adicionado!");
}
function removeFromCart(sid){
  var nc=[];
  for(var i=0;i<cart.length;i++) if(cart[i].id!==sid) nc.push(cart[i]);
  cart=nc; updBadge(); renderCart("list");
}

/* ── HELPERS ── */
function gv(id){var el=document.getElementById(id);return el?el.value.trim():""}
function mkF(id,lbl,type){return '<div class="fld"><label class="lbl">'+lbl+'</label><input class="inp" type="'+type+'" id="'+id+'"></div>'}
function mkTA(id,lbl){return '<div class="fld"><label class="lbl">'+lbl+'</label><textarea class="inp" id="'+id+'" rows="3"></textarea></div>'}

function mkCard(s,delay){
  if(!delay) delay=0;
  var tagH=s.tag?'<div class="tag" style="margin-bottom:10px">'+s.tag+'</div>':"";
  return '<div class="card" style="animation-delay:'+delay+'ms">'
    +'<div style="position:absolute;top:0;right:0;background:#ff4400;color:#fff;font-size:9px;font-weight:800;padding:4px 9px;letter-spacing:1px">60% OFF</div>'
    +tagH
    +'<div style="font-size:32px;margin-bottom:10px">'+s.icon+'</div>'
    +'<h3 style="font-size:16px;font-weight:700;margin-bottom:8px">'+s.title+'</h3>'
    +'<p style="color:#8a8a9a;font-size:12px;line-height:1.7;font-family:\'DM Mono\',monospace;margin-bottom:16px">'+s.desc+'</p>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px">'

function carouselGo(idx){
  carouselIdx=idx;
  var track=document.getElementById("carousel-track");
  if(!track) return;
  var slideW=track.children[0]?track.children[0].offsetWidth+16:300;
  track.style.transform="translateX(-"+(idx*slideW)+"px)";
  var dots=document.querySelectorAll(".carousel-dot");
  for(var i=0;i<dots.length;i++) dots[i].classList.toggle("on",i===idx);
}
function carouselNext(){
  carouselGo((carouselIdx+1)%PORTFOLIO.length);
}
function carouselPrev(){
  carouselGo((carouselIdx-1+PORTFOLIO.length)%PORTFOLIO.length);
}

// touch/swipe support
(function(){
  var sx=0, dragging=false;
  document.addEventListener("touchstart",function(e){
    var el=document.getElementById("carousel-track"); if(!el) return;
    if(!el.contains(e.target)) return;
    sx=e.touches[0].clientX; dragging=true;
  },{passive:true});
  document.addEventListener("touchend",function(e){
    if(!dragging) return; dragging=false;
    var dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40){ dx<0?carouselNext():carouselPrev(); }
  },{passive:true});
})();

/* ── ORDER CHAT ── */
var orderChatListening={};

function clientColor(name){
  // generate consistent color from name
  var palette=["#ff6b6b","#ffa94d","#ffe066","#69db7c","#38d9a9","#4dabf7","#da77f2","#f783ac","#a9e34b","#63e6be"];
  var hash=0;
  for(var i=0;i<name.length;i++) hash=(hash*31+name.charCodeAt(i))&0xffffffff;
  return palette[Math.abs(hash)%palette.length];
}

function sendOrderChat(oid){
  if(!window._fbReady){showToast("Aguarde...","#ffaa00");return;}
  var text=gv("order-chat-inp"); if(!text) return;
  var name=localStorage.getItem("order_chat_name_"+oid)||"Cliente";
  var color=clientColor(name);
  window._fbPush(window._fbRef(window._fbDB,"order_chats/order_"+oid+"/messages"),{
    from:"client",name:name,color:color,text:text,time:new Date().toLocaleString("pt-BR"),ts:Date.now()
  });
  var inp=document.getElementById("order-chat-inp"); if(inp) inp.value="";
}

function startOrderChatListen(oid){
  var key="order_"+oid;
  if(orderChatListening[key]||!window._fbReady) return;
  orderChatListening[key]=true;
  window._fbOnValue(window._fbRef(window._fbDB,"order_chats/"+key+"/messages"),function(snap){
    var msgs=[];
    if(snap.exists()) snap.forEach(function(c){msgs.push(c.val());});
    var el=document.getElementById("order-chat-msgs"); if(!el) return;
    if(msgs.length===0) return;
    var h="";
    for(var i=0;i<msgs.length;i++){
      var m=msgs[i], isClient=m.from==="client";
      var cls=isClient?"msg-client":"msg-dev";
      h+='<div class="'+cls+'"><div>'+m.text+'</div><div class="msg-time">'+m.time+'</div></div>';
    }
    el.innerHTML=h; el.scrollTop=el.scrollHeight;
  });
}

var chatOpen=false;
var chatUser=localStorage.getItem("chat_name")||"";
var chatEmail=localStorage.getItem("chat_email")||"";
var chatSession=localStorage.getItem("chat_session")||"";
var chatListening=false, lastMsgCount=0, adminChatListening=false;

function emailToSessId(email){
  // convert email to safe firebase key: replace @ and . with _
  return "email_"+email.toLowerCase().replace(/[^a-z0-9]/g,"_");
}

function makeSessFromEmail(email){
  chatSession=emailToSessId(email);
  localStorage.setItem("chat_session",chatSession);
}

function toggleChat(){
  chatOpen=!chatOpen;
  var box=document.getElementById("chat-box");
  if(chatOpen){
    box.classList.add("open");
    document.getElementById("chat-notif").style.display="none";
    if(!chatEmail) renderChatName();
    else{renderChatMsgs();startListenChat();}
  } else {
    box.classList.remove("open");
  }
}

function setChatUser(){
  var n=gv("cn-name"), em=gv("cn-email");
  if(!n){showToast("Digite seu nome!","#ff4466");return;}
  if(!em||em.indexOf("@")<0){showToast("Digite um email valido!","#ff4466");return;}

  localStorage.setItem("chat_email",chatEmail);
  makeSessFromEmail(chatEmail);
  if(window._fbReady) window._fbSet(window._fbRef(window._fbDB,"sessions/"+chatSession),{name:chatUser,email:chatEmail,started:new Date().toLocaleString("pt-BR")});
  renderChatMsgs(); startListenChat();

function renderChatMsgs(){
  document.getElementById("chat-body").innerHTML=
    '<div id="chat-msgs"></div>'
    +'<div id="chat-form">'
    +'<input id="chat-input" class="inp" placeholder="Mensagem..." autocomplete="off">'

    +'</div>';
  var inp=document.getElementById("chat-input");
  if(inp) inp.addEventListener("keydown",function(e){if(e.key==="Enter")sendChatMsg();});

function sendChatMsg(){
  if(!window._fbReady){showToast("Aguarde...","#ffaa00");return;}
  if(!chatSession) makeSessFromEmail(chatEmail);
  var text=gv("chat-input"); if(!text) return;
  window._fbPush(window._fbRef(window._fbDB,"chats/"+chatSession+"/messages"),{from:"client",name:chatUser,email:chatEmail,text:text,time:new Date().toLocaleString("pt-BR"),ts:Date.now()});
  var inp=document.getElementById("chat-input"); if(inp) inp.value="";
}

function startListenChat(){
  if(chatListening||!window._fbReady) return;
  chatListening=true;
  if(!chatSession) makeSessFromEmail(chatEmail);
  window._fbOnValue(window._fbRef(window._fbDB,"chats/"+chatSession+"/messages"),function(snap){
    var msgs=[];
    if(snap.exists()) snap.forEach(function(c){msgs.push(c.val());});
    var el=document.getElementById("chat-msgs");
    if(!el) return;
    if(msgs.length===0){el.innerHTML='<div style="text-align:center;color:#8a8a9a;font-family:\'DM Mono\';font-size:12px;padding:20px">Ola '+chatUser+'! Me manda sua mensagem.</div>';return;}
    var h="";
    for(var i=0;i<msgs.length;i++){
      var m=msgs[i], cls=m.from==="client"?"msg-client":"msg-dev";
      h+='<div class="'+cls+'"><div>'+m.text+'</div><div class="msg-time">'+m.time+'</div></div>';
    }
    el.innerHTML=h; el.scrollTop=el.scrollHeight;
    if(msgs.length>lastMsgCount&&lastMsgCount>0){
      var last=msgs[msgs.length-1];
      if(last.from==="dev"&&!chatOpen){document.getElementById("chat-notif").style.display="block";showToast("Nova resposta!");}
    }
    lastMsgCount=msgs.length;
  });
}

function startAdminListen(){
  if(adminChatListening||!window._fbReady) return;
  adminChatListening=true;
  // listen to regular chats
  window._fbOnValue(window._fbRef(window._fbDB,"chats"),function(snap){
    allSessions={};
    if(snap.exists()) snap.forEach(function(child){
      var msgs=[]; child.child("messages").forEach(function(m){msgs.push(m.val());});
      allSessions[child.key]={messages:msgs, type:"chat"};
    });
    if(adminTab==="chat") renderTab();
  });
  // listen to order chats
  window._fbOnValue(window._fbRef(window._fbDB,"order_chats"),function(snap){
    if(snap.exists()) snap.forEach(function(child){
      var msgs=[]; child.child("messages").forEach(function(m){msgs.push(m.val());});

function fixImgUrl(url){
  if(!url) return "";
  // Google Drive: /file/d/ID/view -> thumbnail URL que nao bloqueia
  var driveMatch = url.match(/\/file\/d\/([^\/\?]+)/);
  if(driveMatch) return "https://drive.google.com/thumbnail?id="+driveMatch[1]+"&sz=w800";
  // Imgur album -> nao conseguimos, retorna vazio
  if(url.indexOf("imgur.com/a/")>-1) return "";
  return url;
}

  selectedColor=c;

function addPortfolioItem(){
  var name=gv("pf-name"), cat=gv("pf-cat"), img=gv("pf-img"), url=gv("pf-url");
  var color=document.getElementById("pf-color")?document.getElementById("pf-color").value:selectedColor;
  if(!name){showToast("Digite o nome do projeto!","#ff4466");return;}
  var item={id:Date.now(),name:name,cat:cat||"Outro",img:img,url:url,color:color||"#00ff88"};
  PORTFOLIO.push(item);
  saveLS("ds_portfolio",PORTFOLIO);
  showToast("Projeto adicionado! Va a Home para ver no carrossel.","#00ff88");
  renderDash();
}

function removePortfolioItem(id){
  PORTFOLIO=PORTFOLIO.filter(function(p){return p.id!=id;});
  saveLS("ds_portfolio",PORTFOLIO);
  showToast("Projeto removido.","#ff4466");
  renderDash();
  if(currentPage==="home") renderHome();
}

function editPortfolioItem(id){
  var p=null;
  for(var i=0;i<PORTFOLIO.length;i++) if(PORTFOLIO[i].id==id){p=PORTFOLIO[i];break;}
  if(!p) return;
  // fill form fields with existing data
  var fn=document.getElementById("pf-name"), fc=document.getElementById("pf-cat");
  var fi=document.getElementById("pf-img"), fu=document.getElementById("pf-url");
  if(fn) fn.value=p.name;
  if(fc) fc.value=p.cat;
  if(fi) fi.value=p.img;
  if(fu) fu.value=p.url;
  selectColor(p.color);
  // change button to "Salvar edicao"
  var btn=document.querySelector("[onclick='addPortfolioItem()']");
  if(btn){
    btn.textContent="Salvar edicao";
    btn.setAttribute("onclick","savePortfolioEdit("+id+")");
  }
  window.scrollTo(0,0);
}

function savePortfolioEdit(id){
  var name=gv("pf-name"), cat=gv("pf-cat"), img=gv("pf-img"), url=gv("pf-url");
  var color=document.getElementById("pf-color")?document.getElementById("pf-color").value:selectedColor;
  if(!name){showToast("Digite o nome!","#ff4466");return;}
  for(var i=0;i<PORTFOLIO.length;i++){
    if(PORTFOLIO[i].id==id){
      PORTFOLIO[i].name=name; PORTFOLIO[i].cat=cat||"Outro";
      PORTFOLIO[i].img=img; PORTFOLIO[i].url=url; PORTFOLIO[i].color=color||"#00ff88";
      break;
    }
  }
  saveLS("ds_portfolio",PORTFOLIO);
  showToast("Projeto atualizado!","#00ff88");
  renderDash();
  if(currentPage==="home") renderHome();
}


function updateOrderStatus(oid, newStatus){
  for(var i=0;i<orders.length;i++){
    if(orders[i].id===oid){ orders[i].status=newStatus; break; }
  }
  saveLS("ds_orders",orders);
  if(window._fbReady) window._fbPush(window._fbRef(window._fbDB,"orders_status"), {id:oid,status:newStatus,ts:Date.now()});
  showToast("Status atualizado: "+newStatus,"#00ff88");
  renderTab();
}

  var dl=localStorage.getItem(key);
  if(!dl){
    dl=Date.now()+(48*60*60*1000);
    localStorage.setItem(key,dl);
  }
  dl=parseInt(dl);
  function tick(){
    var diff=dl-Date.now();
    if(diff<=0){
      var el=document.getElementById("countdown");
      if(el) el.textContent="ENCERRADO";
      var bar=document.getElementById("promo-bar");
      if(bar) bar.style.display="none";
      return;
    }
    var h=Math.floor(diff/3600000);
    var m=Math.floor((diff%3600000)/60000);
    var s=Math.floor((diff%60000)/1000);
    var pad=function(n){return n<10?"0"+n:n;};
    var el=document.getElementById("countdown");
    if(el) el.textContent=pad(h)+":"+pad(m)+":"+pad(s);
    setTimeout(tick,1000);
  }
  tick();
})();

/* ── INIT ── */
renderHome();
updAdminBtn();
</script>
</body>
</html>
