<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#080a0f;min-height:100vh;color:#e8e0d0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0f15}::-webkit-scrollbar-thumb{background:#00ff88;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00ff8844}50%{box-shadow:0 0 0 10px #00ff8800}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.card-hover{transition:transform .3s,box-shadow .3s}
.card-hover:hover{transform:translateY(-6px);box-shadow:0 20px 40px #00ff8820}
.btn-p{background:#00ff88;color:#080a0f;border:none;padding:12px 28px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-p:hover{background:#00dd77;transform:translateY(-2px)}
.btn-o{background:transparent;color:#00ff88;border:1px solid #00ff8844;padding:10px 24px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase}
.btn-o:hover{border-color:#00ff88;background:#00ff8810}
.inp{background:#0d0f15;border:1px solid #1e2230;color:#e8e0d0;padding:12px 16px;font-family:'DM Mono',monospace;font-size:14px;width:100%;outline:none;transition:border .2s}
.inp:focus{border-color:#00ff88}
textarea.inp{resize:vertical}
.tag{display:inline-block;background:#00ff8815;color:#00ff88;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;text-transform:uppercase}
.udot{width:8px;height:8px;background:#ff4466;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
header{position:sticky;top:0;z-index:100;background:rgba(8,10,15,.93);backdrop-filter:blur(20px);border-bottom:1px solid #1e2230;padding:0 clamp(20px,5vw,80px)}
.hdr{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{cursor:pointer;display:flex;align-items:center;gap:10px}
.logo-box{width:32px;height:32px;background:#00ff88;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-txt{font-weight:800;font-size:18px;letter-spacing:2px;color:#e8e0d0}
.logo-txt span{color:#00ff88}
.nav-wrap{display:flex;gap:28px;align-items:center}
.nl{cursor:pointer;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8a8a9a;transition:color .2s;padding:4px 0;border-bottom:1px solid transparent}
.nl.on{color:#00ff88;border-bottom-color:#00ff88}
.ci{cursor:pointer;position:relative;font-size:20px;user-select:none}
.cb{position:absolute;top:-8px;right:-8px;background:#00ff88;color:#080a0f;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center}
.pg{display:none}.pg.on{display:block}
footer{border-top:1px solid #1e2230;padding:40px clamp(20px,6vw,100px);margin-top:60px}
.ft{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.fl{cursor:pointer;font-size:12px;color:#8a8a9a;font-family:'DM Mono';letter-spacing:1px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:14px 28px;font-family:'DM Mono';font-size:13px;z-index:9999;white-space:nowrap;display:none;pointer-events:none}
.lbl{font-size:11px;color:#8a8a9a;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;font-family:'DM Mono'}
.fld{margin-bottom:16px}

/* CHAT WIDGET */
#chat-btn{position:fixed;bottom:28px;right:28px;width:56px;height:56px;background:#00ff88;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;z-index:999;box-shadow:0 4px 20px #00ff8840;transition:transform .2s}
#chat-btn:hover{transform:scale(1.1)}
#chat-notif{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:#ff4466;border-radius:50%;display:none;animation:blink 1s infinite}
#chat-box{position:fixed;bottom:100px;right:28px;width:340px;background:#0d0f15;border:1px solid #1e2230;z-index:998;display:none;flex-direction:column;box-shadow:0 20px 60px #000a;animation:fadeUp .3s}
#chat-box.open{display:flex}
#chat-header{background:#080a0f;padding:16px 20px;border-bottom:1px solid #1e2230;display:flex;align-items:center;justify-content:space-between}
#chat-header-left{display:flex;align-items:center;gap:10px}
#chat-online{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:pulse 2s infinite}
#chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;max-height:320px;min-height:200px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:#1e2230}
.msg-client{align-self:flex-end;background:#00ff8820;border:1px solid #00ff8830;color:#e8e0d0;padding:10px 14px;border-radius:12px 12px 2px 12px;font-size:13px;max-width:80%;line-height:1.5}
.msg-dev{align-self:flex-start;background:#1e2230;color:#e8e0d0;padding:10px 14px;border-radius:12px 12px 12px 2px;font-size:13px;max-width:80%;line-height:1.5}
.msg-time{font-size:10px;color:#8a8a9a;font-family:'DM Mono';margin-top:3px}
.msg-client .msg-time{text-align:right}
#chat-form{padding:12px;border-top:1px solid #1e2230;display:flex;gap:8px}
#chat-input{flex:1;background:#080a0f;border:1px solid #1e2230;color:#e8e0d0;padding:10px 14px;font-family:'DM Mono';font-size:13px;outline:none;border-radius:0}
#chat-input:focus{border-color:#00ff88}
#chat-send{background:#00ff88;color:#080a0f;border:none;padding:10px 16px;cursor:pointer;font-weight:800;font-size:16px;transition:background .2s}
#chat-send:hover{background:#00dd77}
#chat-name-screen{padding:20px;display:flex;flex-direction:column;gap:12px}
</style>
</head>

  💬

<div id="chat-box">

        <div style="font-weight:700;font-size:14px">DevStudio</div>

</div>

<div id="toast"></div>

function loadLS(k) { try { var v=localStorage.getItem(k); return v?JSON.parse(v):[]; } catch(e){return[];} }

/* ============================================================
   TOAST
============================================================ */
var toastTimer = null;
function showToast(msg, color) {
  if (!color) color = "#00ff88";
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.cssText = "display:block;background:#0d1420;border:1px solid "+color+";color:"+color+";position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:14px 28px;font-family:'DM Mono';font-size:13px;z-index:9999;white-space:nowrap;pointer-events:none";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.style.display="none"; }, 3000);
}

/* ============================================================
   NAV
============================================================ */
function goTo(page) {
  var all = document.querySelectorAll(".pg");
  for (var i=0;i<all.length;i++) all[i].classList.remove("on");
  document.getElementById("pg-"+page).classList.add("on");
  var nls = document.querySelectorAll(".nl");
  for (var i=0;i<nls.length;i++) nls[i].classList.remove("on");
  var nl = document.getElementById("nl-"+page);
  if (nl) nl.classList.add("on");
  currentPage = page;
  window.scrollTo(0,0);
  if (page==="home")     renderHome();
  if (page==="servicos") renderServicos();
  if (page==="carrinho") renderCart("list");
  if (page==="admin")    renderAdmin();
  updBadge();
  updAdminBtn();
}

function updBadge() {
  var b = document.getElementById("cart-badge");
  if (cart.length>0){b.style.display="flex";b.textContent=cart.length;}
  else{b.style.display="none";}
}

function updAdminBtn() {
  var btn = document.getElementById("admin-btn");
  btn.innerHTML = adminLogged ? "🔓" : "🔒";
}

/* ============================================================
   CART
============================================================ */
function addToCart(sid) {
  var svc=null;
  for(var i=0;i<SVC.length;i++){if(SVC[i].id===sid){svc=SVC[i];break;}}
  if(!svc) return;
  var found=false;
  for(var i=0;i<cart.length;i++) if(cart[i].id===sid){found=true;break;}
  if(!found) cart.push({id:svc.id,icon:svc.icon,title:svc.title,price:svc.price});
  updBadge();
  showToast('"'+svc.title+'" adicionado ao carrinho!');
}
function removeFromCart(sid){
  var nc=[];
  for(var i=0;i<cart.length;i++) if(cart[i].id!==sid) nc.push(cart[i]);
  cart=nc; updBadge(); renderCart("list");
}

/* ============================================================
   HELPERS
============================================================ */
function gv(id){var el=document.getElementById(id);return el?el.value.trim():"";}
function mkField(id,label,type){
  return '<div class="fld"><label class="lbl">'+label+'</label><input class="inp" type="'+type+'" id="'+id+'"></div>';
}
function mkTA(id,label){
  return '<div class="fld"><label class="lbl">'+label+'</label><textarea class="inp" id="'+id+'" rows="3"></textarea></div>';
}
function mkCard(s,delay){
  if(!delay) delay=0;
  var tagH = s.tag?'<div class="tag" style="margin-bottom:10px">'+s.tag+'</div>':"";
  var oldP = s.oldPrice?'<div style="font-size:12px;color:#8a8a9a;text-decoration:line-through;font-family:\'DM Mono\',monospace">R$ '+s.oldPrice.toLocaleString("pt-BR")+'</div>':"";
  var prazoH = s.prazo?'<div style="font-size:11px;color:#8a8a9a;font-family:\'DM Mono\',monospace;margin-top:4px">Prazo: '+s.prazo+'</div>':"";
  return '<div class="card-hover" style="background:#0d0f15;border:1px solid #1e2230;padding:28px;animation:fadeUp .6s ease '+delay+'ms both;position:relative;overflow:hidden">'
    +'<div style="position:absolute;top:0;right:0;background:#ff4400;color:#fff;font-size:10px;font-weight:800;padding:4px 10px;letter-spacing:1px">60% OFF</div>'
    +tagH
    +'<div style="font-size:36px;margin-bottom:12px">'+s.icon+'</div>'
    +'<h3 style="font-size:18px;font-weight:700;margin-bottom:10px">'+s.title+'</h3>'
    +'<p style="color:#8a8a9a;font-size:13px;line-height:1.7;font-family:\'DM Mono\',monospace;margin-bottom:20px">'+s.desc+'</p>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end">'
    +'<div>'+oldP+'<div style="font-size:22px;font-weight:800;color:#00ff88;line-height:1.1">R$ '+s.price.toLocaleString("pt-BR")+'</div>'+prazoH+'</div>'
    +'<button class="btn-p" style="font-size:12px;padding:10px 18px" onclick="addToCart('+s.id+')">+ Adicionar</button>'
    +'</div></div>';
}

/* ============================================================
   SERVICOS
============================================================ */
function renderServicos(){
  var cards="";
  for(var i=0;i<SVC.length;i++) cards+=mkCard(SVC[i],i*60);

/* ============================================================
   CARRINHO
============================================================ */
function renderCart(step){
  var total=0;
  for(var i=0;i<cart.length;i++) total+=cart[i].price;
  var el=document.getElementById("pg-carrinho");
  if(step==="done"){
    el.innerHTML='<div style="padding:100px clamp(20px,6vw,100px);text-align:center;animation:fadeUp .5s">'
      +'<div style="font-size:64px;margin-bottom:24px">🎉</div>'
      +'<h2 style="font-size:36px;font-weight:800;margin-bottom:16px">Pedido recebido!</h2>'
      +'<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;margin-bottom:32px">Entrarei em contato em breve.</p>'
      +'<button class="btn-p" onclick="goTo(\'home\')">Voltar ao inicio</button></div>';
    return;
  }
  if(step==="form"){
    el.innerHTML='<div style="padding:60px clamp(20px,6vw,100px);max-width:600px">'
      +'<h2 style="font-size:32px;font-weight:800;margin-bottom:32px">Seus dados</h2>'
      +mkField("order-name","Nome completo *","text")
      +mkField("order-email","E-mail *","email")
      +mkField("order-phone","WhatsApp","text")
      +mkTA("order-obs","Observacoes")
      +'<div style="display:flex;gap:12px;margin-top:24px">'
      +'<button class="btn-o" onclick="renderCart(\'list\')">Voltar</button>'
      +'<button class="btn-p" onclick="submitOrder()">Enviar pedido</button>'
      +'</div></div>';
    return;
  }
  if(cart.length===0){
    el.innerHTML='<div style="padding:60px clamp(20px,6vw,100px);text-align:center">'
      +'<div style="font-size:64px;margin-bottom:16px">🛒</div>'
      +'<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Carrinho vazio.</p>'
      +'<button class="btn-p" style="margin-top:24px" onclick="goTo(\'servicos\')">Ver servicos</button></div>';
    return;
  }
  var items="";
  for(var i=0;i<cart.length;i++){
    var c=cart[i];
    items+='<div style="background:#0d0f15;border:1px solid #1e2230;padding:24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      +'<div style="display:flex;gap:20px;align-items:center">'
      +'<span style="font-size:32px">'+c.icon+'</span>'
      +'<div><div style="font-weight:700">'+c.title+'</div>'
      +'<div style="color:#00ff88;font-weight:700">R$ '+c.price.toLocaleString("pt-BR")+'</div></div></div>'
      +'<button style="background:none;border:1px solid #ff446640;color:#ff4466;padding:6px 14px;cursor:pointer;font-family:\'Syne\',sans-serif;font-size:12px" onclick="removeFromCart('+c.id+')">remover</button>'
      +'</div>';
  }
  el.innerHTML='<div style="padding:60px clamp(20px,6vw,100px)">'
    +'<h2 style="font-size:32px;font-weight:800;margin-bottom:32px">Carrinho ('+cart.length+')</h2>'
    +'<div style="display:grid;grid-template-columns:1fr 280px;gap:40px;align-items:start">'
    +'<div>'+items+'</div>'
    +'<div style="background:#0d0f15;border:1px solid #1e2230;padding:28px">'
    +'<div style="font-size:13px;color:#8a8a9a;margin-bottom:8px;font-family:\'DM Mono\',monospace">Total estimado</div>'
    +'<div style="font-size:32px;font-weight:800;color:#00ff88;margin-bottom:24px">R$ '+total.toLocaleString("pt-BR")+'</div>'
    +'<p style="font-size:11px;color:#8a8a9a;font-family:\'DM Mono\',monospace;line-height:1.6;margin-bottom:20px">Valores a confirmar apos analise.</p>'
    +'<button class="btn-p" style="width:100%" onclick="renderCart(\'form\')">Solicitar orcamento</button>'
    +'</div></div></div>';
}

function submitOrder(){
  var name=gv("order-name"),email=gv("order-email"),phone=gv("order-phone"),obs=gv("order-obs");
  if(!name||!email){showToast("Preencha nome e email!","#ff4466");return;}
  var total=0; for(var i=0;i<cart.length;i++) total+=cart[i].price;
  var order={id:Date.now(),name:name,email:email,phone:phone,obs:obs,items:cart.slice(),total:total,status:"Aguardando",date:new Date().toLocaleString("pt-BR")};
  orders.push(order); saveLS("ds_orders",orders);
  // also save to firebase if available
  if(window._fbReady){
    window._fbPush(window._fbRef(window._fbDB,"orders"), order);
  }
  cart=[]; updBadge(); renderCart("done");
  showToast("Pedido enviado!");
}

/* ============================================================
   CHAT — Firebase realtime
============================================================ */
var chatOpen = false;
var chatUser = localStorage.getItem("chat_name") || "";
var chatSession = localStorage.getItem("chat_session") || "";
var chatListening = false;
var lastMsgCount = 0;
var adminChatListening = false;

function makeChatSession(){
  if(!chatSession){
    chatSession = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2,6);
    localStorage.setItem("chat_session", chatSession);
  }
}

function toggleChat(){
  chatOpen = !chatOpen;
  var box = document.getElementById("chat-box");
  if(chatOpen){
    box.classList.add("open");
    document.getElementById("chat-notif").style.display = "none";
    if(!chatUser){
      renderChatNameScreen();
    } else {
      renderChatMsgs();
      startListeningChat();
    }
  } else {
    box.classList.remove("open");
  }
}

function renderChatNameScreen(){
  document.getElementById("chat-body").innerHTML =
    '<div id="chat-name-screen">'
    +'<p style="font-size:13px;color:#8a8a9a;font-family:\'DM Mono\',monospace;line-height:1.6">Ola! Como posso chamar voce?</p>'
    +'<input class="inp" id="chat-name-inp" placeholder="Seu nome..." style="font-size:13px">'
    +'<input class="inp" id="chat-email-inp" placeholder="Seu email (opcional)..." style="font-size:13px">'
    +'<button class="btn-p" style="width:100%;font-size:13px" onclick="setChatUser()">Iniciar conversa</button>'
    +'</div>';
  setTimeout(function(){ var el=document.getElementById("chat-name-inp"); if(el) el.focus(); },100);
}

function setChatUser(){
  var name = gv("chat-name-inp");
  if(!name){showToast("Digite seu nome!","#ff4466");return;}
  chatUser = name;
  var email = gv("chat-email-inp");
  localStorage.setItem("chat_name", chatUser);
  makeChatSession();
  // save session info to firebase
  if(window._fbReady){
    window._fbSet(window._fbRef(window._fbDB,"sessions/"+chatSession), {name:chatUser, email:email, started:new Date().toLocaleString("pt-BR")});
  }
  renderChatMsgs();
  startListeningChat();
}

function renderChatMsgs(){
  document.getElementById("chat-body").innerHTML =
    '<div id="chat-msgs"></div>'
    +'<div id="chat-form">'
    +'<input id="chat-input" class="inp" placeholder="Digite sua mensagem..." autocomplete="off">'
    +'<button id="chat-send" onclick="sendChatMsg()">➤</button>'
    +'</div>';
  var inp = document.getElementById("chat-input");
  if(inp) inp.addEventListener("keydown", function(e){ if(e.key==="Enter") sendChatMsg(); });
}

function sendChatMsg(){
  if(!window._fbReady){showToast("Conectando...","#ffaa00");return;}
  makeChatSession();
  var text = gv("chat-input");
  if(!text) return;
  var msg = {from:"client", name:chatUser, text:text, time:new Date().toLocaleString("pt-BR"), ts:Date.now()};
  window._fbPush(window._fbRef(window._fbDB,"chats/"+chatSession+"/messages"), msg);
  var inp=document.getElementById("chat-input"); if(inp) inp.value="";
}

function startListeningChat(){
  if(chatListening || !window._fbReady) return;
  chatListening = true;
  makeChatSession();
  window._fbOnValue(window._fbRef(window._fbDB,"chats/"+chatSession+"/messages"), function(snap){
    var msgs=[];
    if(snap.exists()){
      snap.forEach(function(child){ msgs.push(child.val()); });
    }
    renderChatMessages(msgs);
    // notify new dev message
    if(msgs.length > lastMsgCount && lastMsgCount > 0){
      var last = msgs[msgs.length-1];
      if(last.from==="dev" && !chatOpen){
        document.getElementById("chat-notif").style.display="block";
        showToast("Nova resposta do dev!", "#00ff88");
      }
    }
    lastMsgCount = msgs.length;
  });
}

function renderChatMessages(msgs){
  var el = document.getElementById("chat-msgs");
  if(!el) return;
  var html="";
  if(msgs.length===0){
    html='<div style="text-align:center;color:#8a8a9a;font-family:\'DM Mono\',monospace;font-size:12px;padding:20px">Ola '+chatUser+'! Manda sua mensagem.</div>';
  }
  for(var i=0;i<msgs.length;i++){
    var m=msgs[i];
    var cls = m.from==="client" ? "msg-client" : "msg-dev";
    html+='<div class="'+cls+'"><div>'+m.text+'</div><div class="msg-time">'+m.time+'</div></div>';
  }
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

/* ============================================================
   ADMIN
============================================================ */
function renderAdmin(){
  var el=document.getElementById("pg-admin");
  if(!adminLogged){
    el.innerHTML='<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px">'
      +'<div style="background:#0d0f15;border:1px solid #1e2230;padding:48px 40px;width:100%;max-width:380px;animation:fadeUp .5s">'
      +'<div style="text-align:center;margin-bottom:32px">'
      +'<div style="font-size:40px;margin-bottom:12px">🔒</div>'
      +'<h2 style="font-weight:800;font-size:22px">Area Admin</h2>'
      +'<p style="color:#8a8a9a;font-size:12px;font-family:\'DM Mono\',monospace;margin-top:6px">Acesso restrito</p></div>'
      +mkField("adm-user","Usuario","text")
      +mkField("adm-pass","Senha","password")
      +'<div id="adm-err" style="color:#ff4466;font-size:12px;font-family:\'DM Mono\',monospace;margin-bottom:12px;display:none">Usuario ou senha incorretos</div>'
      +'<button class="btn-p" style="width:100%;margin-top:8px" onclick="doLogin()">Entrar</button>'

      if(pu) pu.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
      if(pp) pp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

    return;

  renderDash();
}

function doLogin(){
  var u=gv("adm-user"), p=gv("adm-pass");
  if(u===ADMIN_USER&&p===ADMIN_PASS){
    adminLogged=true; updAdminBtn(); renderDash();
    startAdminChatListener();
  } else {
    var e=document.getElementById("adm-err"); if(e) e.style.display="block";
  }
}
function doLogout(){ adminLogged=false; updAdminBtn(); renderAdmin(); }

function renderDash(){
  var el=document.getElementById("pg-admin");
  var pending=0; for(var i=0;i<orders.length;i++) if(orders[i].status==="Aguardando") pending++;

  var cMsgs=adminTab==="chat"?"#00ff88":"#8a8a9a";
  var cOrd =adminTab==="orders"?"#00ff88":"#8a8a9a";
  var bMsgs=adminTab==="chat"?"2px solid #00ff88":"2px solid transparent";
  var bOrd =adminTab==="orders"?"2px solid #00ff88":"2px solid transparent";

  el.innerHTML='<div style="padding:40px clamp(20px,5vw,80px)">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px">'
    +'<div><h2 style="font-size:28px;font-weight:800">Painel Admin 🔓</h2>'
    +'<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace;font-size:12px">Bem-vindo, Matheus!</p></div>'
    +'<button class="btn-o" onclick="doLogout()">Sair</button></div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px">'
    +'<div style="background:#0d0f15;border:1px solid #1e2230;padding:20px 24px"><div style="font-size:24px;margin-bottom:8px">🛒</div><div style="font-size:26px;font-weight:800">'+orders.length+'</div><div style="font-size:11px;color:#8a8a9a;text-transform:uppercase;letter-spacing:1px;font-family:\'DM Mono\',monospace">Pedidos</div></div>'
    +'<div style="background:#0d0f15;border:1px solid #1e2230;padding:20px 24px"><div style="font-size:24px;margin-bottom:8px">⏳</div><div style="font-size:26px;font-weight:800;color:'+(pending>0?"#ffaa00":"#e8e0d0")+'">'+pending+'</div><div style="font-size:11px;color:#8a8a9a;text-transform:uppercase;letter-spacing:1px;font-family:\'DM Mono\',monospace">Pendentes</div></div>'
    +'</div>'
    +'<div style="display:flex;border-bottom:1px solid #1e2230;margin-bottom:32px">'
    +'<button style="background:none;border:none;font-family:\'Syne\',sans-serif;font-weight:700;font-size:13px;padding:12px 24px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;color:'+cMsgs+';border-bottom:'+bMsgs+'" onclick="switchTab(\'chat\')">💬 Chats ao vivo</button>'
    +'<button style="background:none;border:none;font-family:\'Syne\',sans-serif;font-weight:700;font-size:13px;padding:12px 24px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;color:'+cOrd+';border-bottom:'+bOrd+'" onclick="switchTab(\'orders\')">🛒 Pedidos</button>'
    +'</div>'
    +'<div id="tab-content"></div></div>';
  renderTab();
}

function switchTab(t){adminTab=t;renderDash();}

/* Admin chat list */
var allSessions = {};
var openSession = null;

function startAdminChatListener(){
  if(adminChatListening||!window._fbReady) return;
  adminChatListening=true;
  window._fbOnValue(window._fbRef(window._fbDB,"chats"), function(snap){
    allSessions={};
    if(snap.exists()){
      snap.forEach(function(child){
        var sid=child.key;
        var msgs=[];
        var msgsSnap=child.child("messages");
        msgsSnap.forEach(function(m){ msgs.push(m.val()); });
        allSessions[sid]={messages:msgs};
      });
    }
    if(adminTab==="chat") renderTab();
    updAdminBtn();
  });
}

function renderTab(){
  var el=document.getElementById("tab-content");
  if(!el) return;

  if(adminTab==="chat"){
    if(!window._fbReady){el.innerHTML='<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Conectando ao Firebase...</p>';return;}
    var keys=Object.keys(allSessions);
    if(keys.length===0){el.innerHTML='<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Nenhum chat ainda. Aguarde clientes.</p>';return;}

    if(openSession && allSessions[openSession]){
      renderAdminChatThread(openSession);
      return;
    }

    // list all sessions
    var html='';
    for(var i=0;i<keys.length;i++){
      var sid=keys[i];
      var sess=allSessions[sid];
      var msgs=sess.messages;
      var lastName = msgs.length>0 ? msgs[0].name : sid;
      var lastMsg  = msgs.length>0 ? msgs[msgs.length-1].text : "";
      var unread   = 0;
      for(var j=0;j<msgs.length;j++) if(msgs[j].from==="client"&&!msgs[j].read) unread++;
      html+='<div style="background:#0d0f15;border:1px solid '+(unread>0?"#00ff8833":"#1e2230")+';padding:20px;margin-bottom:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="openChatSession(\''+sid+'\')">'
        +'<div>'
        +'<div style="font-weight:700;margin-bottom:4px">'+lastName+(unread>0?'<span style="margin-left:8px;background:#ff4466;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px">'+unread+' novo</span>':"")+'</div>'
        +'<div style="font-size:12px;color:#8a8a9a;font-family:\'DM Mono\',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">'+lastMsg+'</div>'
        +'</div>'
        +'<span style="color:#00ff88;font-size:18px">></span>'
        +'</div>';
    }
    el.innerHTML=html;
    return;
  }

  if(adminTab==="orders"){
    if(orders.length===0){el.innerHTML='<p style="color:#8a8a9a;font-family:\'DM Mono\',monospace">Nenhum pedido ainda.</p>';return;}
    var html="";
    var rev=orders.slice().reverse();
    for(var i=0;i<rev.length;i++){
      var o=rev[i];
      var itags="";
      if(o.items) for(var j=0;j<o.items.length;j++) itags+='<span class="tag">'+o.items[j].icon+' '+o.items[j].title+'</span> ';
      var sc=o.status==="Aguardando"?"color:#ffaa00;border:1px solid #ffaa0044":"color:#00ff88;border:1px solid #00ff8844";
      html+='<div style="background:#0d0f15;border:1px solid #1e2230;padding:24px;margin-bottom:16px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">'
        +'<div><div style="font-weight:700;font-size:16px">'+o.name+'</div>'
        +'<div style="color:#8a8a9a;font-size:12px;font-family:\'DM Mono\',monospace">'+o.email+(o.phone?" - "+o.phone:"")+'</div></div>'
        +'<div style="text-align:right"><div style="font-size:22px;font-weight:800;color:#00ff88">R$ '+(o.total||0).toLocaleString("pt-BR")+'</div>'
        +'<div style="font-size:10px;color:#8a8a9a;font-family:\'DM Mono\',monospace">'+o.date+'</div></div></div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">'+itags+'</div>'
        +(o.obs?'<p style="font-size:13px;color:#8a8a9a;font-family:\'DM Mono\',monospace;border-top:1px solid #1e2230;padding-top:12px">'+o.obs+'</p>':"")
        +'<div style="margin-top:12px"><span style="font-size:11px;font-family:\'DM Mono\',monospace;padding:3px 10px;'+sc+'">● '+o.status+'</span></div>'
        +'</div>';
    }
    el.innerHTML=html;
  }
}

function openChatSession(sid){
  openSession=sid;
  renderTab();
}

function renderAdminChatThread(sid){
  var el=document.getElementById("tab-content");
  var sess=allSessions[sid];
  if(!sess){el.innerHTML="";return;}
  var msgs=sess.messages;
  var name=msgs.length>0?msgs[0].name:sid;

  var msgsHtml="";
  for(var i=0;i<msgs.length;i++){
    var m=msgs[i];
    var cls=m.from==="client"?"msg-client":"msg-dev";
    // mark as read if client msg
    msgsHtml+='<div class="'+cls+'"><div>'+m.text+'</div><div class="msg-time">'+m.time+'</div></div>';
  }

  el.innerHTML='<button class="btn-o" style="font-size:12px;margin-bottom:20px" onclick="openSession=null;renderTab()">← Voltar aos chats</button>'
    +'<div style="background:#0d0f15;border:1px solid #1e2230;display:flex;flex-direction:column">'
    +'<div style="padding:16px 20px;border-bottom:1px solid #1e2230;font-weight:700">'+name+'</div>'
    +'<div id="adm-chat-msgs" style="padding:16px;display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto">'+msgsHtml+'</div>'
    +'<div style="padding:12px;border-top:1px solid #1e2230;display:flex;gap:8px">'
    +'<input id="adm-reply-inp" class="inp" placeholder="Digite sua resposta..." style="font-size:13px">'
    +'<button class="btn-p" style="font-size:13px;padding:10px 20px" onclick="sendAdminReply(\''+sid+'\')">Enviar</button>'
    +'</div></div>';

  var box=document.getElementById("adm-chat-msgs");
  if(box) box.scrollTop=box.scrollHeight;
  var inp=document.getElementById("adm-reply-inp");
  if(inp) inp.addEventListener("keydown",function(e){if(e.key==="Enter") sendAdminReply(sid);});
}

function sendAdminReply(sid){
  if(!window._fbReady) return;
  var text=gv("adm-reply-inp");
  if(!text) return;
  var msg={from:"dev",name:"DevStudio",text:text,time:new Date().toLocaleString("pt-BR"),ts:Date.now()};
  window._fbPush(window._fbRef(window._fbDB,"chats/"+sid+"/messages"), msg);
  var inp=document.getElementById("adm-reply-inp"); if(inp) inp.value="";
}

/* ============================================================
   FIREBASE READY CALLBACK
============================================================ */
window._fbReadyCb = function(){
  if(chatUser && chatSession){
    startListeningChat();
  }
  if(adminLogged){
    startAdminChatListener();
  }
};

/* ============================================================
   INIT
============================================================ */
renderHome();
updAdminBtn();
</script>
